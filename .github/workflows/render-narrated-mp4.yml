name: Render narrated MP4

on:
  workflow_dispatch:
  push:
    paths:
      - 'assets/port-twin-agent-demo.webm'
      - 'assets/demo-narration.mp3'

permissions:
  contents: write

jobs:
  render-mp4:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      - name: Render narrated MP4
        run: |
          VIDEO="assets/port-twin-agent-demo.webm"
          AUDIO="assets/demo-narration.mp3"
          OUTPUT="assets/port-twin-agent-demo-narrated.mp4"

          SOURCE_DURATION=$(ffprobe -v error -show_entries format=duration -of csv=p=0 "$VIDEO")
          TRIMMED_DURATION=$(python -c 'import sys; source=float(sys.argv[1]); print(max(source - 1.0, source * 0.9))' "$SOURCE_DURATION")

          ffmpeg -y -i "$VIDEO" -i "$AUDIO" \
            -filter_complex "[0:v]crop=iw:ih-54:0:54,trim=duration=${TRIMMED_DURATION},setpts=PTS-STARTPTS[vtrim];[vtrim]split=2[vtrim1][vtrim2];[vtrim1][vtrim2]concat=n=2:v=1:a=0[vout]" \
            -map "[vout]" -map 1:a:0 \
            -c:v libx264 -preset medium -crf 18 \
            -c:a aac -b:a 160k \
            -shortest -movflags +faststart \
            "$OUTPUT"
      - name: Commit narrated MP4
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Render narrated port twin demo MP4
          file_pattern: assets/port-twin-agent-demo-narrated.mp4
