name: Render narrated MP4

on:
  workflow_dispatch:
  push:
    paths:
      - 'assets/port-twin-agent-demo.webm'
      - 'assets/demo-narration.mp3'

permissions:
  contents: write

jobs:
  render-mp4:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      - name: Render narrated MP4
        run: |
          ffmpeg -y -stream_loop 5 -i assets/port-twin-agent-demo.webm \
            -i assets/demo-narration.mp3 \
            -map 0:v:0 -map 1:a:0 \
            -c:v copy -c:a aac -b:a 160k \
            -shortest -movflags +faststart \
            assets/port-twin-agent-demo-narrated.mp4
      - name: Commit narrated MP4
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Render narrated port twin demo MP4
          file_pattern: assets/port-twin-agent-demo-narrated.mp4
